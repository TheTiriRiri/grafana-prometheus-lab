global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Reguły są ewaluowane i widoczne w Prometheus UI (Status → Alerts),
# ale notyfikacje obsługuje Grafana (Alerting → Alert rules), nie Alertmanager.
rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "fastapi-app"
    static_configs:
      - targets: ["app:8000"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
